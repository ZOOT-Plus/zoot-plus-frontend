name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm typecheck` still has pre-existing failures (business-code type
      # errors + ungenerated i18n), so it runs as non-blocking for now. Remove
      # `continue-on-error` once those are cleared to make it an enforced gate.
      - name: Type check
        run: pnpm typecheck
        continue-on-error: true

      # Lint is an enforced gate: errors fail the job. Warnings do not fail
      # oxlint, so the remaining warnings stay visible without blocking.
      - name: Lint
        run: pnpm lint
